name: "Protocol Buffers Generation"
on:
  push:
    tags:
      - v**
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: "Generate Protocol Buffers"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ["order", "payment", "shipping", "auth", "product"]
    steps:
      - name: Install Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.24
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Set Release Version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Install Protocol Buffers Compiler
        run: |
          sudo apt-get update -y
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Generate Protocol Buffers
        shell: bash
        run: |
          chmod +x "${GITHUB_WORKSPACE}/protoc.sh"
          ./protoc.sh ${{ matrix.service }} ${{ env.RELEASE_VERSION }} ${{ github.actor }} ${{ github.actor }}@users.noreply.github.com