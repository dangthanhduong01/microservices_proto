syntax = "proto3";

import "google/protobuf/timestamp.proto";

option go_package = "github.com/dangthanhduong01/microservices_proto/pb/auth";

message User {
    string id = 1;
    string username = 2;
    string email = 3;
    google.protobuf.Timestamp created_at = 4;
    google.protobuf.Timestamp updated_at = 5;
}
