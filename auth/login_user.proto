syntax = "proto3";

import "user.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dangthanhduong01/microservices_proto/auth";

message LoginUserRequest {
    string username = 1;
    string password = 2;
}

message LoginUserResponse {
    User user = 1;
    string session_id = 2;
    string access_token = 3;
    string refresh_token = 4;
    google.protobuf.Timestamp access_token_expiry = 5;
    google.protobuf.Timestamp refresh_token_expiry = 6;
}

message LogoutUserRequest {
    string session_id = 1;
}

message LogoutUserResponse {
    bool success = 1;
}

message CreateUserRequest {
    string username = 1;
    string email = 2;
    string password = 3;
}

message CreateUserResponse {
    User user = 1;
}