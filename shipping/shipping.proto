syntax = "proto3";

package shipping;

option go_package = "github.com/dangthanhduong01/microservices_proto/pb/shipping";

message CreateShippingRequest {
    string order_id = 1;
    string address = 2;
}

message CreateShippingResponse {
    string tracking_id = 1;
    string status = 2;
}

service Shipping {
    rpc Create(CreateShippingRequest) returns (CreateShippingResponse);
}
